<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dimensional World</title>
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>

</head>
<body>

    <a-sky color="#ECECEC"></a-sky>
    

    <a-box color="Red" position="0 -2 5" scale="2 2 2 "></a-box>

    <a-plane position="0 0 -4" rotation="-90 0 0" width="15" height="20" color="#7BC8A4"></a-plane>

    <a-assets>

        <a-asset-item id="house" src="house.glb"></a-asset-item>
    </a-assets>

    <a-light type="ambient" color="#fff"></a-light>

    <a-camera position="0 1.6 0"></a-camera>

    

    
</body>


</html>
